<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IKM Dashboard — RSU Islam Klaten</title>
  <meta name="description" content="Dashboard Indeks Kepuasan Masyarakat (IKM) RSU Islam Klaten" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone (JSX transform) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2301696f'/><text y='.9em' font-size='70' text-anchor='middle' x='50' fill='white'>🏥</text></svg>" />
</head>
<body>
  <!-- Loading splash -->
  <div id="root">
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;gap:1rem;font-family:'Plus Jakarta Sans',sans-serif;">
      <img src="rsi-logo.svg" style="width:128px;height:128px;" aria-label="RSU Islam Klaten"></img>
      <div style="font-size:1.1rem;font-weight:700;color:#1a1a2e;">Memuat Dashboard IKM…</div>
      <div style="width:36px;height:36px;border:3px solid #e9ecef;border-top-color:#01696f;border-radius:50%;animation:spin 0.7s linear infinite;"></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
  </div>

  <!--
    LOAD ORDER (critical):
    1. db.js    — IndexedDB setup (no JSX)
    2. app.js   — React app (JSX via Babel)
  -->
  <script src="db.js"></script>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
